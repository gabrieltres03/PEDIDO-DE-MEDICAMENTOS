<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos WhatsApp → Excel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #161a18;
    --border: #2a3030;
    --accent: #25d366;
    --accent2: #128c7e;
    --text: #e8ede9;
    --muted: #7a8b7e;
    --danger: #ff5252;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .main {
    width: 100%;
    max-width: 960px;
    padding: 40px 24px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* Upload zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: var(--surface);
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: #161d1a; }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
  .drop-icon { font-size: 48px; margin-bottom: 16px; }
  .drop-title {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 8px;
  }
  .drop-sub { font-size: 0.82rem; color: var(--muted); }
  .drop-sub span { color: var(--accent); font-weight: 600; }

  /* Filter row */
  .filters {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 0.8rem; color: var(--muted); font-family: 'Space Mono', monospace; }

  input[type="date"], input[type="text"], select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border 0.2s;
  }
  input[type="date"]:focus, input[type="text"]:focus, select:focus { border-color: var(--accent); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.4); }

  .btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #20c05a; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    flex: 1;
    min-width: 120px;
  }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1;
  }
  .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* Table */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .table-title { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  th {
    background: #1a1f1d;
    padding: 12px 16px;
    text-align: left;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 11px 16px;
    font-size: 0.85rem;
    border-bottom: 1px solid #1e2421;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1a1f1d; }

  td.date { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--muted); }
  td.produto { font-weight: 600; }
  td.qtd {
    font-family: 'Space Mono', monospace;
    color: var(--accent);
    font-size: 0.9rem;
  }
  td.cto { font-family: 'Space Mono', monospace; font-size: 0.82rem; color: var(--accent2); }

  .badge-remove {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .badge-remove:hover { color: var(--danger); background: rgba(255,82,82,0.1); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-family: 'Space Mono', monospace; font-size: 0.85rem; }

  /* Pagination */
  .pagination {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: flex-end;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .page-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    transition: all 0.15s;
  }
  .page-btn:hover, .page-btn.active { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .notice {
    background: rgba(37,211,102,0.07);
    border: 1px solid rgba(37,211,102,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--muted);
    display: none;
  }
  .notice.show { display: block; }
  .notice strong { color: var(--accent); }

  @media(max-width: 600px) {
    header { padding: 18px 16px; }
    .main { padding: 20px 12px; }
    .drop-zone { padding: 40px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">💬</div>
  <div>
    <h1>Pedidos <span>WhatsApp</span> → Excel</h1>
    <div class="subtitle">Importação de pedidos do grupo de medicamentos</div>
  </div>
</header>

<div class="main">

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".txt">
    <div class="drop-icon">📂</div>
    <div class="drop-title">Arraste o arquivo .txt do WhatsApp aqui</div>
    <div class="drop-sub">ou <span>clique para selecionar</span></div>
  </div>

  <div class="notice" id="notice"></div>

  <!-- Stats -->
  <div class="stats" id="statsBar" style="display:none">
    <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Itens encontrados</div></div>
    <div class="stat"><div class="stat-val" id="statDatas">0</div><div class="stat-lbl">Datas diferentes</div></div>
    <div class="stat"><div class="stat-val" id="statLotes">0</div><div class="stat-lbl">Lotes (CTO)</div></div>
    <div class="stat"><div class="stat-val" id="statProd">0</div><div class="stat-lbl">Produtos únicos</div></div>
  </div>

  <!-- Filters + export -->
  <div class="filters" id="filterRow" style="display:none">
    <span class="filter-label">FILTRAR:</span>
    <input type="date" id="filtDe" title="De">
    <span style="color:var(--muted);font-size:.8rem">até</span>
    <input type="date" id="filtAte" title="Até">
    <input type="text" id="filtProd" placeholder="Produto..." style="width:150px">
    <input type="text" id="filtCto" placeholder="CTO/Lote..." style="width:120px">
    <button class="btn btn-outline" onclick="aplicarFiltro()">Filtrar</button>
    <button class="btn btn-outline" onclick="limparFiltro()">Limpar</button>
    <button class="btn btn-primary" id="btnExport" onclick="exportarExcel()">⬇ Exportar Excel</button>
  </div>

  <!-- Table -->
  <div class="table-wrap" id="tableWrap" style="display:none">
    <div class="table-header">
      <span class="table-title" id="tableTitle">— registros</span>
      <span style="font-size:.78rem;color:var(--muted)" id="paginaInfo"></span>
    </div>
    <div id="tableBody">
      <div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nenhum dado ainda</div></div>
    </div>
    <div class="pagination" id="paginacao" style="display:none"></div>
  </div>

</div>

<script>
let allData = [];       // todos os registros parsed
let filteredData = [];  // após filtro
let currentPage = 1;
const PAGE_SIZE = 50;

// ─── PARSING ───────────────────────────────────────────────────────────────

function parseWhatsApp(text) {
  const lines = text.split('\n');
  const records = [];

  // Regex para cabeçalho de mensagem do WhatsApp
  // [DD/MM/YYYY, HH:MM:SS] Nome: texto
  const msgRegex = /^\[(\d{2}\/\d{2}\/\d{4}),\s*\d{2}:\d{2}:\d{2}\]\s*[^:]+:\s*(.*)/;

  let currentDate = null;
  let currentBlock = [];   // linhas do bloco atual
  let currentCTO = null;

  function processBlock(date, block, cto) {
    if (!block.length || !cto) return;
    
    // Cada linha do bloco pode ser um item:  "3 - Roflin" ou "Roflin 3 100ml" etc.
    for (const line of block) {
      const trimmed = line.trim();
      if (!trimmed) continue;

      // Padrões de item:
      // "3 - Roflin 100ml"
      // "- 3 roflin"
      // "roflin 3 100ml"
      // "3x roflin"
      // "⁠3 avt450"

      let qty = null, prod = null;

      // Padrão: número - produto (ex: "3 - Roflin")
      let m = trimmed.match(/^-?\s*(\d+)\s*[-x]\s+(.+)/i);
      if (m) { qty = parseInt(m[1]); prod = m[2]; }

      // Padrão: "- 3 produto" (traço no início)
      if (!m) {
        m = trimmed.match(/^[-•⁠]\s*(\d+)\s+(.+)/i);
        if (m) { qty = parseInt(m[1]); prod = m[2]; }
      }

      // Padrão: produto seguido de quantidade e unidade (ex: "Roflin 4 100ml")
      if (!m) {
        m = trimmed.match(/^([a-záàãâéêíóôõúüçA-Z][^\d]+?)\s+(\d+)\s*(?:100ml|50ml|20ml|ml|l|kg|cx|caixa|pacote|unid)?/i);
        if (m && parseInt(m[2]) < 500) { qty = parseInt(m[2]); prod = m[1]; }
      }

      // Padrão: só número + produto sem separador (ex: "10 vetomil")
      if (!m) {
        m = trimmed.match(/^(\d+)\s+(.+)/i);
        if (m && parseInt(m[1]) < 500) { qty = parseInt(m[1]); prod = m[2]; }
      }

      if (qty && prod) {
        // Limpar produto: remover unidades de medida no final
        prod = prod.replace(/\s+\d+\s*(ml|l|kg|cx|unid|pacote|100ml|50ml|20ml|30x15|25x18|20x15)\b.*/i, '').trim();
        prod = prod.replace(/^[-•\s]+/, '').trim();
        if (prod.length > 1 && qty > 0) {
          records.push({ data: formatDate(date), produto: prod.toUpperCase(), quantidade: qty, cto: cto });
        }
      }
    }
  }

  let inBlock = false;
  let blockDate = null;
  let blockCTO = null;
  let blockLines = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const msgMatch = line.match(/^\[(\d{2}\/\d{2}\/\d{4}),\s*\d{2}:\d{2}:\d{2}\]\s*[^:]+:\s*(.*)/);

    if (msgMatch) {
      // Nova mensagem: processar bloco anterior
      if (inBlock) {
        processBlock(blockDate, blockLines, blockCTO);
        inBlock = false;
        blockLines = [];
        blockCTO = null;
      }

      const date = msgMatch[1];
      const content = msgMatch[2].trim();

      // Ignorar mensagens de sistema
      if (content.startsWith('‎') || content === '' ||
          content.includes('apagada') || content.includes('omitido') ||
          content.includes('ocultado') || content.includes('adicionou') ||
          content.includes('removeu') || content.includes('mudou') ||
          content.includes('criptografia') || content.includes('criou o grupo') ||
          content.includes('código de segurança')) continue;

      // Detectar CTO na primeira linha do bloco
      // Padrão: número 5 dígitos no início ou no meio
      const ctoMatch = content.match(/\b(\d{5})\b/);
      if (ctoMatch) {
        blockCTO = ctoMatch[1];
        blockDate = date;
        blockLines = [content.replace(ctoMatch[0], '').replace(/\s+/g,' ').trim()];
        inBlock = true;
      }

    } else if (inBlock) {
      // Linha de continuação do bloco
      blockLines.push(line);
    } else {
      // Linha de continuação de mensagem sem CTO ainda detectado
      // Verificar se contém CTO
      const ctoMatch = line.match(/\b(\d{5})\b/);
      if (ctoMatch && blockDate) {
        blockCTO = ctoMatch[1];
        inBlock = true;
      }
    }
  }

  // Processar último bloco
  if (inBlock) processBlock(blockDate, blockLines, blockCTO);

  return records;
}

function formatDate(ddmmyyyy) {
  const [d, m, y] = ddmmyyyy.split('/');
  return `${d}/${m}/${y}`;
}

// ─── FILE HANDLING ──────────────────────────────────────────────────────────

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

function loadFile(file) {
  if (!file.name.endsWith('.txt')) {
    showNotice('⚠️ Selecione um arquivo .txt exportado do WhatsApp.', 'warn');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    allData = parseWhatsApp(text);
    filteredData = [...allData];
    currentPage = 1;
    updateStats();
    renderTable();
    document.getElementById('statsBar').style.display = 'flex';
    document.getElementById('filterRow').style.display = 'flex';
    document.getElementById('tableWrap').style.display = 'block';
    showNotice(`✅ <strong>${allData.length} itens</strong> encontrados em <strong>${file.name}</strong>`, 'ok');
  };
  reader.readAsText(file, 'UTF-8');
}

function showNotice(msg, type) {
  const n = document.getElementById('notice');
  n.innerHTML = msg;
  n.className = 'notice show';
  n.style.borderColor = type === 'warn' ? 'rgba(255,82,82,0.3)' : 'rgba(37,211,102,0.2)';
  n.style.background = type === 'warn' ? 'rgba(255,82,82,0.07)' : 'rgba(37,211,102,0.07)';
}

// ─── STATS ──────────────────────────────────────────────────────────────────

function updateStats() {
  document.getElementById('statTotal').textContent = allData.length;
  document.getElementById('statDatas').textContent = new Set(allData.map(r => r.data)).size;
  document.getElementById('statLotes').textContent = new Set(allData.map(r => r.cto)).size;
  document.getElementById('statProd').textContent = new Set(allData.map(r => r.produto)).size;
}

// ─── FILTRO ─────────────────────────────────────────────────────────────────

function aplicarFiltro() {
  const de = document.getElementById('filtDe').value;
  const ate = document.getElementById('filtAte').value;
  const prod = document.getElementById('filtProd').value.toUpperCase();
  const cto = document.getElementById('filtCto').value;

  filteredData = allData.filter(r => {
    const [d, m, y] = r.data.split('/');
    const dateISO = `${y}-${m}-${d}`;
    if (de && dateISO < de) return false;
    if (ate && dateISO > ate) return false;
    if (prod && !r.produto.includes(prod)) return false;
    if (cto && !r.cto.includes(cto)) return false;
    return true;
  });

  currentPage = 1;
  renderTable();
}

function limparFiltro() {
  document.getElementById('filtDe').value = '';
  document.getElementById('filtAte').value = '';
  document.getElementById('filtProd').value = '';
  document.getElementById('filtCto').value = '';
  filteredData = [...allData];
  currentPage = 1;
  renderTable();
}

// ─── TABLE ───────────────────────────────────────────────────────────────────

function renderTable() {
  const total = filteredData.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filteredData.slice(start, start + PAGE_SIZE);

  document.getElementById('tableTitle').textContent = `${total} registros`;
  document.getElementById('paginaInfo').textContent = total > PAGE_SIZE ? `Página ${currentPage}/${totalPages}` : '';

  const body = document.getElementById('tableBody');
  if (!slice.length) {
    body.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Nenhum registro encontrado</div></div>`;
    document.getElementById('paginacao').style.display = 'none';
    return;
  }

  let html = `<table><thead><tr><th>DATA</th><th>PRODUTO</th><th>QUANTIDADE</th><th>CTO</th></tr></thead><tbody>`;
  for (const r of slice) {
    html += `<tr>
      <td class="date">${r.data}</td>
      <td class="produto">${escHtml(r.produto)}</td>
      <td class="qtd">${r.quantidade}</td>
      <td class="cto">${r.cto}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  body.innerHTML = html;

  // Pagination
  const pag = document.getElementById('paginacao');
  if (totalPages <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';
  let pagHtml = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let p = Math.max(1, currentPage-2); p <= Math.min(totalPages, currentPage+2); p++) {
    pagHtml += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  pagHtml += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pag.innerHTML = pagHtml;
}

function goPage(p) { currentPage = p; renderTable(); window.scrollTo({top:0,behavior:'smooth'}); }

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── EXPORT EXCEL ────────────────────────────────────────────────────────────

function exportarExcel() {
  if (!filteredData.length) { showNotice('⚠️ Nenhum dado para exportar.','warn'); return; }

  const ws_data = [['DATA','PRODUTO','QUANTIDADE','CTO']];
  for (const r of filteredData) {
    ws_data.push([r.data, r.produto, r.quantidade, r.cto]);
  }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(ws_data);

  // Larguras de coluna
  ws['!cols'] = [{wch:14},{wch:30},{wch:14},{wch:10}];

  // Converter coluna A para data real do Excel usando serial number
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let row = 1; row <= range.e.r; row++) {
    const cellAddr = XLSX.utils.encode_cell({ r: row, c: 0 });
    if (ws[cellAddr] && ws[cellAddr].v) {
      const parts = ws[cellAddr].v.split('/');
      if (parts.length === 3) {
        const d = parseInt(parts[0]), m = parseInt(parts[1]), y = parseInt(parts[2]);
        // Serial do Excel: dias desde 01/01/1900 (com bug de 1900 compatível com Lotus)
        const serial = Math.round((new Date(y, m - 1, d) - new Date(1899, 11, 31)) / 86400000);
        ws[cellAddr] = { t: 'n', v: serial, z: 'DD/MM/YYYY' };
      }
    }
  }

  // Estilo do cabeçalho (limitado ao que xlsx suporta sem licença)
  XLSX.utils.book_append_sheet(wb, ws, 'Pedidos');

  const hoje = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `pedidos_whatsapp_${hoje}.xlsx`);
}
</script>
</body>
</html>
